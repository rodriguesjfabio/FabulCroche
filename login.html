<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FabulCrochet — Login</title>
  <link rel="stylesheet" href="/src/styles/login.css" />
  <meta name="robots" content="noindex,nofollow" />
</head>
<body>
  <header class="site-header login-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <span>Fabul Crochê</span>
      </a>
    </div>
  </header>

  <main class="login-page">
    <section class="login-panel">
      <div class="login-copy">
        <span class="eyebrow">Acesso privado</span>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <label class="field">
          <span>Usuário</span>
          <input type="text" name="username" required autocomplete="username" />
        </label>

        <label class="field">
          <span>Senha</span>
          <input type="password" name="password" required autocomplete="current-password" />
        </label>

        <button type="submit" class="btn btn-primary">Entrar</button>
        <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
      </form>

      <div id="loginMessage" class="login-message" aria-live="polite"></div>
    </section>
  </main>

  <script>
    window.FABUL_WEBHOOK = "https://n8n.fabulcroche.com/webhook/XYhCcGKfXzSDwrnegdeyKCwHUaaAxoXG";
    window.FABUL_VALIDATE_ENDPOINT = "http://localhost:5678/webhook/HuQzWFcAeLgEYKMlishMIdArkRaXdebg";
  </script>
  <script src="/src/scripts/login.js"></script>
</body>
</html>
